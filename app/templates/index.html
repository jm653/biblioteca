<div class="container mt-5">
    <h2 class="mb-4">Tabela de Livros</h2>
    <table class="table">
        <thead>
            <tr>
                <th scope="col">Nome</th>
                <th scope="col">Autor</th>
                <th scope="col">Editora</th>
                <th scope="col">Gênero</th>
                <th scope="col">Preço</th>
                <th scope="col">Data Publicação</th>
                <th scope="col">Status</th>
                <th scope="col">Excluir</th>
            </tr>
        </thead>
        <tbody>
            {% for livro in livros %}
            <tr>
                <td>{{ livro.nome }}</td>
                <td>{{ livro.autor }}</td>
                <td>{{ livro.editora }}</td>
                <td>{{ livro.genero }}</td>
                <td>{{ livro.preco }}</td>
                <td>{{ livro.data_pub }}</td>
                <td>{{ livro.status }}</td>
                <td>
                    <form method="post" action="{% url 'delete' livro.id %}" onsubmit="return confirm('Tem certeza que deseja excluir este livro?');">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Excluir</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
